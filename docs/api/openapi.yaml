openapi: 3.0.3
info:
  title: AI Bridge API
  description: API for stock analysis and AI signal generation.
  version: 2.2.0

servers:
  - url: /api/v1

security:
  - ApiKeyAuth: [] # 新增全域安全宣告

paths:
  /health:
    get:
      summary: System health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/integrity:
    get:
      summary: System integrity and observability check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrityResponse'

  /symbols:
    get:
      summary: Get list of active stock symbols
      parameters:
        - name: exchange
          in: query
          schema:
            type: string
            enum: [TWSE, TPEX]
        - name: is_active
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymbolsResponse'

  /candles/{symbol}:
    get:
      summary: Get candlestick data
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: from_ms
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: to_ms
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: interval
          in: query
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d]
            default: 1h
        - name: indicators
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandlesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /indicators/compute:
    post:
      summary: Compute technical indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeIndicatorsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeIndicatorsResponse'

  /signals/{symbol}:
    get:
      summary: Get trading signals
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: from_ms
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: to_ms
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalsResponse'

  /predict:
    post:
      summary: Get AI prediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResponse'

  /backtest:
    post:
      summary: Run backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacktestRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacktestResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp_ms:
          type: integer
          format: int64
        components:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            python_ai_service:
              type: string
        version:
          type: string

    IntegrityResponse:
      type: object
      properties:
        status:
          type: string
        timestamp_ms:
          type: integer
          format: int64
        checks:
          type: object
          additionalProperties: true
        observability:
          type: object
          properties:
            data_latency_seconds:
              type: integer
            data_latency_status:
              type: string
            ai_inference_p99_ms:
              type: integer
            ai_inference_status:
              type: string
            api_success_rate_pct:
              type: number
            api_success_rate_status:
              type: string
            bridge_errors_last_hour:
              type: integer

    SymbolsResponse:
      type: object
      properties:
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        count:
          type: integer
        last_synced_ms:
          type: integer
          format: int64

    Symbol:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        exchange:
          type: string
        data_source:
          type: string
        earliest_available_ms:
          type: integer
          format: int64
        latest_available_ms:
          type: integer
          format: int64
        is_active:
          type: boolean

    CandlesResponse:
      type: object
      properties:
        symbol:
          type: string
        interval:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        candles:
          type: array
          items:
            $ref: '#/components/schemas/Candle'
        count:
          type: integer
        total_available:
          type: integer
        next_cursor:
          type: string
          nullable: true
        source:
          type: string
        cached:
          type: boolean
        computed_at_ms:
          type: integer
          format: int64

    Candle:
      type: object
      properties:
        timestamp_ms:
          type: integer
          format: int64
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: integer
          format: int64
        indicators:
          type: object
          additionalProperties: true

    ComputeIndicatorsRequest:
      type: object
      properties:
        request_id:
          type: string
        symbol:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        interval:
          type: string
        indicators:
          type: object

    ComputeIndicatorsResponse:
      type: object
      properties:
        symbol:
          type: string
        interval:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        indicators:
          type: object
        computed_at_ms:
          type: integer
          format: int64
        computation_time_ms:
          type: integer
        cached:
          type: boolean
        dag_execution_order:
          type: array
          items:
            type: string

    SignalsResponse:
      type: object
      properties:
        symbol:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        signals:
          type: array
          items:
            $ref: '#/components/schemas/Signal'
        count:
          type: integer

    Signal:
      type: object
      properties:
        id:
          type: string
        timestamp_ms:
          type: integer
          format: int64
        signal_type:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
        entry_price:
          type: number
        target_price:
          type: number
        stop_loss:
          type: number
        reason:
          type: string
        source:
          type: string
        reliability:
          type: string
        fallback_reason:
          type: string
          nullable: true

    PredictionRequest:
      type: object
      properties:
        request_id:
          type: string
        symbol:
          type: string
        indicators:
          type: object
        lookback_hours:
          type: integer

    PredictionResponse:
      type: object
      properties:
        symbol:
          type: string
        up_probability:
          type: number
        down_probability:
          type: number
        confidence_score:
          type: number
        model_version:
          type: string
        inference_time_ms:
          type: integer
        computed_at_ms:
          type: integer
          format: int64

    BacktestRequest:
      type: object
      properties:
        request_id:
          type: string
        symbol:
          type: string
        strategy_name:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        initial_capital:
          type: number
        position_size_percent:
          type: number

    BacktestResponse:
      type: object
      properties:
        backtest_id:
          type: string
        symbol:
          type: string
        strategy_name:
          type: string
        from_ms:
          type: integer
          format: int64
        to_ms:
          type: integer
          format: int64
        initial_capital:
          type: number
        final_capital:
          type: number
        metrics:
          type: object
          properties:
            total_trades:
              type: integer
            winning_trades:
              type: integer
            losing_trades:
              type: integer
            win_rate:
              type: number
            profit_factor:
              type: number
            max_drawdown:
              type: number
            sharpe_ratio:
              type: number
            annual_return:
              type: number
        created_at_ms:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
        message:
          type: string
        fallback_available:
          type: boolean
        timestamp_ms:
          type: integer
          format: int64
        request_id:
          type: string
          nullable: true

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

  responses:
    UnauthorizedError:
      description: API Key is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'